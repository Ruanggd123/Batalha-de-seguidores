name: Deploy para GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
  # Opcional: permitir que outros workflows disparem este
  workflow_call:

permissions:
  contents: write
  pages: write
  id-token: write

# Permite apenas um deploy por vez
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependências
        run: npm install

      # Se você tiver o arquivo followers.json no repo, ele será usado.
      # Caso contrário, o build usará o que estiver na pasta public/ no momento.

      - name: Build do Site
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload do Artefato (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
